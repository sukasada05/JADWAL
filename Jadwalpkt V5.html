<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Jadwal Piket Koramil 1609-05/Sukasada</title>

  <link rel="manifest" href="manifest.json">

  <link href="https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Global Styles */
    * {
      box-sizing: border-box;
      font-family: 'Times New Roman', serif;
    }
    
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    body {
      font-family: 'Times New Roman', serif;
      margin: 0;
      padding: 1rem;
      background: linear-gradient(135deg, #003300, #004d00, #006600, #003300);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #e6ffe6;
      min-height: 100vh;
    }
    
    h2, h3 {
      text-align: center;
      margin-bottom: 0.5rem;
      color: #7fff7f;
      text-shadow: 0 0 5px rgba(127, 255, 127, 0.5);
    }
    
    /* New Radar Container Styles */
    .radar-container {
      position: relative;
      width: 100%;
      height: 300px;
      margin-bottom: 1rem;
      background-color: rgba(0, 20, 0, 0.2);
      border: 2px solid #0f0;
      border-radius: 8px;
      overflow: hidden;
    }

    #mainRadar {
      width: 100%;
      height: 100%;
      display: block;
    }

    .radar-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
      width: 100%;
      padding: 20px;
    }

    .radar-title {
      font-size: 1.5em;
      font-weight: bold;
      color: #7fff7f;
      text-shadow: 0 0 10px rgba(127, 255, 127, 0.7);
      margin-bottom: 5px;
    }

    .radar-subtitle {
      font-size: 1em;
      color: #7fff7f;
      margin-bottom: 15px;
      text-shadow: 0 0 5px rgba(127, 255, 127, 0.5);
    }

    .radar-target {
      font-size: 1.2em;
      font-weight: bold;
      color: #7fff7f;
      background-color: rgba(0, 50, 0, 0.5);
      padding: 8px 15px;
      border-radius: 15px;
      border: 1px solid #7fff7f;
      display: inline-block;
      text-shadow: 0 0 5px rgba(127, 255, 127, 0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }

    /* Rest of your existing styles */
    .section-container {
      background: rgba(0, 40, 0, 0.7);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
      border: 1px solid rgba(0, 255, 127, 0.3);
      backdrop-filter: blur(5px);
      transition: all 0.3s ease;
    }
    
    .section-container:hover {
      box-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
      transform: translateY(-2px);
    }
    
    .bold-text {
      font-weight: bold;
      color: #7fff7f;
    }

    /* Button Styles */
    .btn {
      position: relative;
      background: linear-gradient(270deg, #7fff7f, #004d00, #7fff7f, #7fff7f);
      background-size: 400% 400%;
      animation: gradientMove 5s linear infinite;
      border: 2px solid #7fff7f;
      box-shadow: 0 0 10px #7fff7f, 0 0 20px #7fff7f inset;
      color: #003300;
      font-weight: bold;
      cursor: pointer;
      text-shadow: 0 1px 1px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      overflow: hidden;
      z-index: 1;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1rem;
      margin-top: 0.5rem;
      width: 100%;
    }
    
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .btn:hover {
      background: #7fff7f;
      color: #003300;
      box-shadow: 0 0 15px #7fff7f, 0 0 30px #7fff7f, 0 0 60px #7fff7f;
      transform: scale(1.05);
      text-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #7fff7f, #004d00, #003300, #7fff7f);
      filter: blur(10px);
      opacity: 0.6;
      border-radius: 12px;
      z-index: -1;
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .glow {
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(127,255,127,0.6), transparent 60%);
      pointer-events: none;
      border-radius: 50%;
      animation: clickGlow 0.6s ease-out forwards;
      transform: scale(0);
      z-index: 2;
    }
    
    @keyframes clickGlow {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(4); opacity: 0; }
    }
    
    /* Tab Button Styles */
    .tab-button {
      flex: 1;
      padding: 0.75rem;
      background: linear-gradient(270deg, #7fff7f, #004d00, #7fff7f, #7fff7f);
      background-size: 400% 400%;

    select, textarea {

    /* Calendar Styles */

    .kalender-piket-date {

    .kalender-piket-warning {

    .kalender-piket-loading {

    .kalender-piket-error {

    .urgent-warning {

    /* Hanpangan List */
    .hanpangan-list {
      max-height: 500px;
      overflow-y: auto;
      background: rgba(0, 40, 0, 0.7);
      border-radius: 8px;

      border: 1px solid rgba(0, 255, 127, 0.3);
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
    }
    
    .hanpangan-item {
      padding: 10px;

      display: flex;
      justify-content: space-between;
    }
    
    .hanpangan-item:last-child {

    }
    
    .hanpangan-item.current {
      background: rgba(0, 80, 0, 0.5);
      font-weight: bold;
    }
    
    .hanpangan-index {
      color: #7fff7f;

      margin-right: 10px;
    }
    
    .today-badge {
      background-color: #004d00;
      color: #e6ffe6;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.8em;
    }
    
    .petugas-list {
      margin-bottom: 15px;
      padding: 10px;
      background: rgba(0, 30, 0, 0.5);

    .petugas-item {

    /* Loading and Toast */
    .loading-indicator {
      display: none;
      text-align: center;

    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(0, 60, 0, 0.9);
      color: #e6ffe6;
      padding: 12px 24px;

    }
    
    @media (max-width: 480px) {
      .btn, .tab-button {
        padding: 10px 20px;
        font-size: 1rem;
      }

  </style>

<script>
// ======================== RADAR ANIMATION WITH F-16 SIMULATION ========================
const mainRadar = document.getElementById('mainRadar');
const mainCtx = mainRadar.getContext('2d');

function setupMainRadar() {
    const size = Math.min(mainRadar.clientWidth, mainRadar.clientHeight);
    mainRadar.width = size;
    mainRadar.height = size;
    
    const center = {
        x: mainRadar.width / 2,
        y: mainRadar.height / 2
    };
    const radarRange = mainRadar.width * 0.45;
    let scanAngle = 0;
    const scanSpeed = 0.03;
    
    // F-16 Aircraft Object
    const f16 = {
        x: Math.random() * radarRange * 1.8 - radarRange * 0.9,
        y: Math.random() * radarRange * 1.8 - radarRange * 0.9,
        speedX: (Math.random() - 0.5) * 1.5,
        speedY: (Math.random() - 0.5) * 1.5,
        size: mainRadar.width * 0.04,
        lastDetected: 0,
        signalStrength: 0
    };
    
    function drawRadarBase() {
        // Background gradient
        const gradient = mainCtx.createRadialGradient(
            center.x, center.y, 0,
            center.x, center.y, radarRange
        );
        gradient.addColorStop(0, 'rgba(0, 30, 0, 0.2)');
        gradient.addColorStop(1, 'rgba(0, 80, 0, 0.1)');
        mainCtx.fillStyle = gradient;
        mainCtx.fillRect(0, 0, mainRadar.width, mainRadar.height);
        
        // Radar circles
        mainCtx.strokeStyle = 'rgba(0, 255, 0, 0.15)';
        mainCtx.lineWidth = 1;
        const rings = 5;
        for (let i = 1; i <= rings; i++) {
            const radius = (radarRange / rings) * i;
            mainCtx.beginPath();
            mainCtx.arc(center.x, center.y, radius, 0, Math.PI * 2);
            mainCtx.stroke();
            
            if (i % 2 === 0) {
                mainCtx.fillStyle = 'rgba(0, 255, 0, 0.5)';
                mainCtx.font = `${mainRadar.width * 0.03}px Arial`;
                mainCtx.fillText(`${i * 20}km`, center.x + radius - 20, center.y - 5);
            }
        }
        
        // Radar crosshairs
        mainCtx.strokeStyle = 'rgba(0, 255, 0, 0.3)';
        mainCtx.beginPath();
        mainCtx.moveTo(center.x, center.y - radarRange);
        mainCtx.lineTo(center.x, center.y + radarRange);
        mainCtx.moveTo(center.x - radarRange, center.y);
        mainCtx.lineTo(center.x + radarRange, center.y);
        mainCtx.moveTo(center.x - radarRange * Math.cos(Math.PI/4), center.y - radarRange * Math.sin(Math.PI/4));
        mainCtx.lineTo(center.x + radarRange * Math.cos(Math.PI/4), center.y + radarRange * Math.sin(Math.PI/4));
        mainCtx.moveTo(center.x - radarRange * Math.cos(Math.PI/4), center.y + radarRange * Math.sin(Math.PI/4));
        mainCtx.lineTo(center.x + radarRange * Math.cos(Math.PI/4), center.y - radarRange * Math.sin(Math.PI/4));
        mainCtx.stroke();
        
        // Center dot
        mainCtx.fillStyle = 'rgba(0, 255, 0, 0.7)';
        mainCtx.beginPath();
        mainCtx.arc(center.x, center.y, 3, 0, Math.PI * 2);
        mainCtx.fill();
    }
    
    function drawRadarSweep() {
        const gradient = mainCtx.createRadialGradient(
            center.x, center.y, 0,
            center.x, center.y, radarRange
        );
        gradient.addColorStop(0, 'rgba(0, 255, 0, 0.7)');
        gradient.addColorStop(0.7, 'rgba(0, 255, 0, 0.2)');
        gradient.addColorStop(1, 'rgba(0, 255, 0, 0)');
        
        mainCtx.strokeStyle = gradient;
        mainCtx.lineWidth = 2;
        mainCtx.beginPath();
        mainCtx.moveTo(center.x, center.y);
        mainCtx.lineTo(
            center.x + Math.cos(scanAngle) * radarRange,
            center.y + Math.sin(scanAngle) * radarRange
        );
        mainCtx.stroke();
        
        mainCtx.fillStyle = 'rgba(0, 255, 0, 0.03)';
        mainCtx.beginPath();
        mainCtx.moveTo(center.x, center.y);
        mainCtx.arc(center.x, center.y, radarRange, scanAngle - scanSpeed - 0.1, scanAngle);
        mainCtx.closePath();
        mainCtx.fill();
        
        scanAngle += scanSpeed;
        if (scanAngle > Math.PI * 2) {
            scanAngle = 0;
        }
    }
    
    function drawF16() {
        // Update F-16 position
        f16.x += f16.speedX;
        f16.y += f16.speedY;
        
        // Bounce off radar edges
        if (Math.abs(f16.x) > radarRange - f16.size) {
            f16.speedX *= -1;
            f16.x = Math.sign(f16.x) * (radarRange - f16.size);
        }
        if (Math.abs(f16.y) > radarRange - f16.size) {
            f16.speedY *= -1;
            f16.y = Math.sign(f16.y) * (radarRange - f16.size);
        }
        
        // Check if radar sweep detects the F-16
        const distFromCenter = Math.sqrt(f16.x**2 + f16.y**2);
        const angleToF16 = Math.atan2(f16.y, f16.x);
        let angleDiff = Math.abs(scanAngle - angleToF16);
        angleDiff = Math.min(angleDiff, Math.PI * 2 - angleDiff);
        
        if (angleDiff < scanSpeed * 2 && distFromCenter < radarRange) {
            f16.lastDetected = Date.now();
            f16.signalStrength = 1;
        } else {
            f16.signalStrength = Math.max(0, f16.signalStrength - 0.01);
        }
        
        // Draw F-16 aircraft
        mainCtx.save();
        mainCtx.translate(center.x + f16.x, center.y + f16.y);
        const planeAngle = Math.atan2(f16.speedY, f16.speedX);
        mainCtx.rotate(planeAngle);
        
        // Aircraft color based on signal strength
        const bodyColor = f16.signalStrength > 0.5 
            ? `rgba(255, 100, 100, ${0.5 + f16.signalStrength * 0.5})` 
            : 'rgba(150, 150, 150, 0.7)';
        
        // Draw aircraft body (triangle shape)
        mainCtx.fillStyle = bodyColor;
        mainCtx.beginPath();
        mainCtx.moveTo(f16.size * 0.6, 0);
        mainCtx.lineTo(-f16.size * 0.4, -f16.size * 0.3);
        mainCtx.lineTo(-f16.size * 0.6, -f16.size * 0.2);
        mainCtx.lineTo(-f16.size * 0.6, f16.size * 0.2);
        mainCtx.lineTo(-f16.size * 0.4, f16.size * 0.3);
        mainCtx.closePath();
        mainCtx.fill();
        
        // Draw cockpit
        mainCtx.fillStyle = 'rgba(100, 200, 255, 0.7)';
        mainCtx.beginPath();
        mainCtx.arc(f16.size * 0.3, 0, f16.size * 0.15, 0, Math.PI * 2);
        mainCtx.fill();
        
        // Draw wings and tail
        mainCtx.strokeStyle = bodyColor;
        mainCtx.lineWidth = 2;
        mainCtx.beginPath();
        mainCtx.moveTo(f16.size * 0.1, -f16.size * 0.9);
        mainCtx.lineTo(-f16.size * 0.4, -f16.size * 0.9);
        mainCtx.moveTo(f16.size * 0.1, f16.size * 0.9);
        mainCtx.lineTo(-f16.size * 0.4, f16.size * 0.9);
        mainCtx.moveTo(-f16.size * 0.4, -f16.size * 1.2);
        mainCtx.lineTo(-f16.size * 0.7, 0);
        mainCtx.lineTo(-f16.size * 0.4, f16.size * 1.2);

        mainCtx.stroke();
        

         mainCtx.strokeStyle = bodyColor;
        mainCtx.lineWidth = 2;
        mainCtx.beginPath();
        mainCtx.moveTo(f16.size * 0.1, -f16.size * 0.9);
        mainCtx.lineTo(-f16.size * 0.4, -f16.size * 0.9);
        mainCtx.moveTo(f16.size * 0.1, f16.size * 0.9);
        mainCtx.lineTo(-f16.size * 0.4, f16.size * 0.9);
        mainCtx.moveTo(-f16.size * 0.4, -f16.size * 1.2);
        mainCtx.lineTo(-f16.size * 0.7, 0);
        mainCtx.lineTo(-f16.size * 0.4, f16.size * 1.2);
        mainCtx.restore();
        
        mainCtx.restore();

        
        // Draw aircraft info when detected
        if (f16.signalStrength > 0.3) {
            const infoX = center.x + f16.x + f16.size * 1.5;
            const infoY = center.y + f16.y - f16.size * 1.5;
            
            mainCtx.fillStyle = `rgba(0, 255, 0, ${f16.signalStrength})`;
            mainCtx.font = `${mainRadar.width * 0.025}px Courier New`;
            mainCtx.fillText('F-16 FALCON', infoX, infoY);
            
            const distance = Math.round(distFromCenter / radarRange * 100);
            const speed = Math.round(Math.sqrt(f16.speedX**2 + f16.speedY**2) * 50);
            mainCtx.fillText(`DIST: ${distance}km`, infoX, infoY + mainRadar.width * 0.03);
            mainCtx.fillText(`SPD: ${speed}km/h`, infoX, infoY + mainRadar.width * 0.06);
        }
    }
    
    function drawRadarInfo() {
        mainCtx.fillStyle = 'rgba(0, 255, 0, 0.7)';
        mainCtx.font = `${mainRadar.width * 0.03}px Courier New`;
        mainCtx.textAlign = 'left';
        mainCtx.fillText('RADAR ACTIVE', 10, 20);
        
        mainCtx.font = `${mainRadar.width * 0.02}px Courier New`;
        const now = new Date();
        const timeStr = now.toUTCString().split(' ')[4];
        mainCtx.fillText(`TIME: ${timeStr}`, 10, 40);
        
        mainCtx.textAlign = 'right';
        mainCtx.fillText('AIR SURVEILLANCE MODE', mainRadar.width - 10, 20);
        mainCtx.fillText(`RANGE: ${Math.round(radarRange / mainRadar.width * 100)}km`, mainRadar.width - 10, 40);
    }
    
    function animateMainRadar() {
        mainCtx.clearRect(0, 0, mainRadar.width, mainRadar.height);
        drawRadarBase();
        drawF16();
        drawRadarSweep();
        drawRadarInfo();
        requestAnimationFrame(animateMainRadar);
    }
    
    animateMainRadar();
}

    // ======================== CACHE SERVICE ========================
    const CacheService = {
      get: function(key) {
        const item = localStorage.getItem(key);
        if (!item) return null;
        
        try {
          const data = JSON.parse(item);
          if (Date.now() - data.timestamp > CONFIG.CACHE_TIMEOUT) {
            localStorage.removeItem(key);
            return null;
          }
          return data.value;
        } catch (e) {
          localStorage.removeItem(key);
          return null;
        }
      },
      
      set: function(key, value) {
        const data = {
          value: value,
          timestamp: Date.now()
        };
        localStorage.setItem(key, JSON.stringify(data));
      },
      
      clear: function(key) {
        localStorage.removeItem(key);
      }
    };

      fetchWithCache: async function(url, cacheKey) {
        // Check cache first
        const cachedData = CacheService.get(cacheKey);
        if (cachedData && AppState.isOnline === false) {
          return cachedData;
        }
        
        try {
          const response = await fetch(`${url}?t=${Date.now()}`);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          
          const data = await response.text();
          CacheService.set(cacheKey, data);
          return data;
        } catch (error) {
          console.error(`Failed to fetch ${url}:`, error);
          if (cachedData) {
            return cachedData;
          }
          throw error;
        }
      },
      
      checkOnlineStatus: async function() {
        try {
          const response = await fetch('https://httpbin.org/get', { method: 'HEAD' });
          return response.ok;
        } catch (e) {
          return false;
        }
      }

      formatDate: function(date, withComma = false) {
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", 
                       "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        return withComma
          ? `${days[date.getDay()]}, ${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`
          : `${days[date.getDay()]} ${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
      },
      
      isEmpty: function(n1, n2) {
        return !(n1.trim() || n2.trim());

      updatePreview: function() {
        const now = new Date();
        const tomorrow = new Date();
        tomorrow.setDate(now.getDate() + 1);
        
        const sections = [
          { 
            title: this.formatDate(now, true), 
            nameA: document.getElementById("nama1a").value, 
            nameB: document.getElementById("nama1b").value

          { 
            title: this.formatDate(tomorrow, false), 
            nameA: document.getElementById("nama2a").value, 
            nameB: document.getElementById("nama2b").value 
          },
          { 
            title: this.formatDate(now, true) + " (Kediaman)", 
            nameA: document.getElementById("nama3a").value, 
            nameB: document.getElementById("nama3b").value 
          },

    // ======================== CALENDAR SERVICE ========================
    const CalendarService = {
      loadData: async function() {
        try {
          const data = await NetworkService.fetchWithCache(CONFIG.KALENDER_URL, CONFIG.KALENDER_CACHE_KEY);
          return this.parseData(data);
        } catch (error) {
          console.error('Error loading calendar data:', error);
          throw error;
        }
      },
      
      parseData: function(textData) {
        const sections = {
          koramil: { title: 'A. ⭐⭐️ Piket Koramil⭐⭐', dates: [] },
          kediaman: { title: 'B. ⭐⭐ Jaga Kediaman⭐⭐', dates: [] },
          makodim: { title: 'C. ⭐⭐ Piket Makodim ⭐⭐', dates: [] }
        };
        
        let currentSection = null;
        
        textData.split('\n').forEach(line => {
          const trimmedLine = line.trim();
          if (!trimmedLine) return;
          
          if (trimmedLine.startsWith('A.')) {
            currentSection = 'koramil';
          } else if (trimmedLine.startsWith('B.')) {
            currentSection = 'kediaman';
          } else if (trimmedLine.startsWith('C.')) {
            currentSection = 'makodim';
          } 
          else if (trimmedLine.startsWith('-') && currentSection) {
            const dateStr = trimmedLine.substring(1).trim();
            sections[currentSection].dates.push({
              date: dateStr,
              personnel: []
            });
          }
          else if (currentSection && sections[currentSection].dates.length > 0) {
            const [rank, ...nameParts] = trimmedLine.split(' ');
            const name = nameParts.join(' ');
            if (rank && name) {
              const lastDateIndex = sections[currentSection].dates.length - 1;
              sections[currentSection].dates[lastDateIndex].personnel.push({
                rank,
                name
              });
            }
          }
        });
        
        return sections;
      },
      
      render: function(scheduleData) {
        let html = '';
        
        for (const [sectionKey, sectionData] of Object.entries(scheduleData)) {
          if (sectionData.dates.length === 0) continue;
          
          html += `<div class="kalender-piket-section">
            <div class="kalender-piket-section-title">${sectionData.title}</div>`;
          
          sectionData.dates.forEach(dateData => {
            html += `<div class="kalender-piket-date-group">
              <div class="kalender-piket-date">${dateData.date}</div>
              <div class="kalender-piket-personnel">`;
              
            dateData.personnel.forEach((person, index) => {
              html += `${index + 1}. ${person.rank} ${person.name}<br>`;
            });
            
            html += `</div></div>`;
          });
          
          html += `</div>`;
        }
        
        document.getElementById('kalenderPiketContent').innerHTML = html;
        document.getElementById('kalenderPiketLoading').style.display = 'none';
        document.getElementById('kalenderPiketContent').style.display = 'block';
      }
    };

        } finally {
          loadingIndicator.style.display = 'none';
        }

        tab.classList.remove('active');

          .catch(error => console.error("Error loading Hanpangan list:", error));

      glow.style.top = `${event.clientY - 100}px`;

              "Koramil 1609-05/Sukasada",
              subtitleLines[0],
              `Hanpangan hari ini : ${hanpanganData.current}`
            );
          }
        } catch (error) {
          console.error("Error updating after coming online:", error);

      } else {
        NotificationService.showToast("Internet terputus! Mode offline aktif");

          "Koramil 1609-05/Sukasada",
          "Mode Offline",
          "Hanpangan : (Tidak dapat memperbarui)"

      }
    }

    // Start the application
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeApp);
    } else {

    }
